name: Build and release LauncherX for Windows x64

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag name for the release (optional for manual dispatch)'
        required: false
        default: ''
      release_name:
        description: 'Release title (optional)'
        required: false
        default: ''
      release_body:
        description: 'Release notes/body (optional)'
        required: false
        default: ''
      prerelease:
        description: 'Mark the release as prerelease'
        required: false
        default: 'false'

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner environment
        run: |
          Write-Host "Runner OS: $($PSVersionTable.OS)"
          Write-Host "Shell: $($PSVersionTable.PSEdition)"
          Write-Host "Platform: $env:PROCESSOR_ARCHITECTURE"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore LauncherXWinUI/LauncherXWinUI.csproj

      - name: Build LauncherXWinUI x64 Release
        run: dotnet build LauncherXWinUI/LauncherXWinUI.csproj -c Release -r win-x64 /p:Platform=x64 /p:TargetFramework=net8.0-windows10.0.22621.0

      - name: Publish LauncherXWinUI x64 Release
        run: |
          dotnet publish LauncherXWinUI/LauncherXWinUI.csproj \
            -c Release \
            -r win-x64 \
            /p:Platform=x64 \
            /p:TargetFramework=net8.0-windows10.0.22621.0 \
            --self-contained false \
            /p:PublishSingleFile=false \
            /p:PublishTrimmed=false \
            -o "$PWD/publish/win-x64"

      - name: Package published output
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath "package/LauncherX-win-x64.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LauncherX-win-x64
          path: package/LauncherX-win-x64.zip

      - name: Create GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag || format('manual-{0}', github.run_number) }}
          release_name: ${{ github.event.inputs.release_name || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Manual Release {0}', github.run_number)) }}
          body: ${{ github.event.inputs.release_body }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: package/LauncherX-win-x64.zip
          asset_name: LauncherX-win-x64.zip
          asset_content_type: application/zip
